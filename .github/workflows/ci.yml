name: Soroban CI

# ── Required status checks (branch protection) ────────────────────────────────
# To protect `main`, go to Settings → Branches → Branch protection rules and
# enable "Require status checks to pass before merging". Add these check names:
#   • "Build and Test Contracts"
#   • "Build and Test Frontend (20)"
#   • "Build and Test Frontend (22)"
#   • "Build and Test Indexer (20)"
#   • "Build and Test Indexer (22)"
#   • "Secret Scanning (Gitleaks)"
#   • "Dependency Scanning"
# Each job name above maps to a distinct GitHub status check.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          LATEST=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f4 | tr -d v)
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_${LATEST}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --log-level warn --report-format sarif --report-path gitleaks.sarif || (cat gitleaks.sarif | python3 -c "import sys,json; [print(r['locations'][0]['physicalLocation']['artifactLocation']['uri'],r['message']['text']) for r in json.load(sys.stdin)['runs'][0]['results']]" 2>/dev/null; exit 1)

  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      # Fails the build on high/critical Cargo advisories.
      # To triage a false-positive, add it to .cargo/audit.toml under
      # [advisories] ignore = ["RUSTSEC-XXXX-XXXX"].
      - name: Cargo Audit (high/critical)
        run: cargo audit --deny warnings

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache frontend node_modules (audit)
        uses: actions/cache@v4
        with:
          path: frontend/elcarehub-app/node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('frontend/elcarehub-app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-20-

      - name: Cache indexer node_modules (audit)
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: ${{ runner.os }}-indexer-20-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: ${{ runner.os }}-indexer-20-

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend/elcarehub-app

      - name: Install indexer deps
        run: npm ci
        working-directory: indexer

      # Fails the build on high/critical npm advisories.
      # To triage a finding run: npm audit --audit-level=high
      # and follow https://docs.npmjs.com/auditing-package-dependencies-for-security-vulnerabilities
      - name: npm audit — frontend (high/critical)
        run: npm audit --audit-level=high
        working-directory: frontend/elcarehub-app

      - name: npm audit — indexer (high/critical)
        run: npm audit --audit-level=high
        working-directory: indexer

  contracts:
    name: Build and Test Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Check Formatting
        run: cargo fmt --check
      - name: Run Cargo Clippy (Linting)
        run: cargo clippy
      - name: Build WASM Dependencies
        run: cargo build --target wasm32v1-none --release
      - name: Run Unit Tests
        run: cargo test

  frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: frontend/elcarehub-app/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('frontend/elcarehub-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: Install Dependencies
        run: npm ci
        working-directory: frontend/elcarehub-app
      - name: Run Lint
        run: npm run lint
        working-directory: frontend/elcarehub-app
      - name: Run Build
        run: npm run build
        working-directory: frontend/elcarehub-app
      - name: Run Tests with Coverage
        run: npm run test:coverage
        working-directory: frontend/elcarehub-app
        env:
          CI: true
      - name: Run Accessibility Tests
        run: npm run test:a11y
        working-directory: frontend/elcarehub-app
      - name: Upload Coverage Report
        if: always() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-node20
          path: frontend/elcarehub-app/coverage/
          retention-days: 14

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: frontend/elcarehub-app/node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('frontend/elcarehub-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-
      - name: Install Dependencies
        run: npm ci
        working-directory: frontend/elcarehub-app
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend/elcarehub-app
      - name: Run E2E Tests
        run: npm run test:e2e
        working-directory: frontend/elcarehub-app
        env:
          CI: true
          NEXT_PUBLIC_E2E_MOCK_CHAIN: 'true'
          NEXT_PUBLIC_CONTRACT_ID: CE2ECONTRACTPLACEHOLDER00000000000000000000001
          NEXT_PUBLIC_LAUNCHPAD_CONTRACT_ID: CE2ELAUNCHPADPLACEHOLDER000000000000000000001
          PINATA_JWT: e2e-test-pinata-jwt
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/elcarehub-app/playwright-report/
          retention-days: 14

  indexer-integration:
    name: Indexer Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace_indexer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: ${{ runner.os }}-indexer-integration-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-indexer-integration-
      - name: Install Dependencies
        run: npm ci
        working-directory: indexer
      - name: Run Integration Tests
        run: npm run test:integration
        working-directory: indexer
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketplace_indexer_test?schema=public
          REDIS_URL: redis://localhost:6379

  indexer:
    name: Build and Test Indexer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: ${{ runner.os }}-indexer-${{ matrix.node-version }}-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-indexer-${{ matrix.node-version }}-
      - name: Install Dependencies
        run: npm ci
        working-directory: indexer
      - name: Run Lint
        run: npm run lint
        working-directory: indexer
      - name: Run Build
        run: npm run build
        working-directory: indexer
      - name: Run Tests
        run: npm run test
        working-directory: indexer
